# In-container nginx: serves the built Medusa admin SPA on port 80.
# Host nginx terminates TLS for med.awakenfs.store and proxies to 127.0.0.1:20021.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets, but never the HTML entrypoint.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Client-side (react-router) routes fall back to the SPA entrypoint.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
